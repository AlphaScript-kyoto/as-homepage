name: Daily AI Blog

on:
  schedule:
    # 毎日 00:00 UTC = 09:00 JST
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/blog/requirements.txt

      - name: Generate blog post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: python scripts/blog/generate_post.py

      - name: Build blog pages
        run: python scripts/blog/build_blog.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog blog sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "Publish blog post $(date -u +%Y-%m-%d)"
          git push
